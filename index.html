<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oyun Dünyası | İki Oyun Bir Arada</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #121212;
            color: #ffffff;
            scroll-behavior: smooth;
        }

        /* Üst Menü */
        header {
            background-color: #1a1a1a;
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        }

        .logo {
            font-size: 1.8rem;
            font-weight: bold;
            color: #ff9f43;
            text-decoration: none;
        }

        nav a {
            color: #ffffff;
            text-decoration: none;
            margin-left: 20px;
            font-weight: 500;
        }

        /* Giriş Ekranı */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: radial-gradient(circle, #24243e 0%, #0f0c1b 100%);
            padding: 20px;
        }

        .hero h1 {
            font-size: 3.5rem;
            margin-bottom: 20px;
            text-shadow: 0px 4px 10px rgba(0, 0, 0, 0.7);
        }

        .hero p {
            font-size: 1.3rem;
            color: #cccccc;
            margin-bottom: 30px;
        }

        .btn-play {
            background-color: #ff9f43;
            color: #121212;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            text-decoration: none;
            transition: 0.3s;
        }

        .btn-play:hover {
            background-color: #ff5e3a;
            color: white;
            transform: translateY(-3px);
        }

        /* Oyunlar Bölümü */
        .games-section {
            padding: 120px 20px;
            text-align: center;
            background-color: #121212;
            min-height: 100vh;
        }

        .games-section h2 {
            font-size: 2.8rem;
            margin-bottom: 50px;
            color: #ff9f43;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 40px;
            max-width: 1100px;
            margin: 0 auto;
            align-items: start;
        }

        /* Ortak Oyun Kartı Tasarımı */
        .game-card {
            background-color: #1e1e1e;
            padding: 30px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255, 159, 67, 0.1);
        }

        .game-card h3 {
            font-size: 1.8rem;
            margin-bottom: 20px;
            color: #ff9f43;
        }

        /* Tıklama Oyunu */
        .click-game-area {
            background-color: #16161a;
            transition: background-color 0.4s ease;
        }

        .score-board {
            font-size: 2rem;
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
        }

        .click-btn {
            background-color: #ff9f43;
            color: #121212;
            border: none;
            padding: 20px 40px;
            font-size: 1.4rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 159, 67, 0.3);
            transition: transform 0.1s, background-color 0.2s;
        }

        .click-btn:active { transform: scale(0.95); }
        .click-btn:hover { background-color: #ff5e3a; color: white; }

        /* Satranç Tahtası Boyutlandırması */
        #board {
            width: 100%;
            max-width: 360px;
            margin: 0 auto 15px auto;
        }

        .status-text {
            font-size: 1.2rem;
            margin: 15px 0;
        }

        .btn-reset {
            background-color: #ff9f43;
            color: #121212;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-reset:hover { background-color: #ff5e3a; color: white; }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">🎮 OYUN DÜNYASI</a>
        <nav><a href="#oyunlar">Oyunlar</a></nav>
    </header>

    <section class="hero">
        <h1>Oyun Siteme Hoş Geldin! 🚀</h1>
        <p>Tıklama ve Satranç oyunlarımız hemen aşağıda seni bekliyor.</p>
        <a href="#oyunlar" class="btn-play">Oyunları Keşfet 👇</a>
    </section>

    <section id="oyunlar" class="games-section">
        <h2>Oyun Alanı</h2>
        
        <div class="games-grid">
            
            <div id="clickGameCard" class="game-card click-game-area">
                <h3>Tıklama Oyunu</h3>
                <div class="score-board">Skor: <span id="score" style="color: #ff9f43;">0</span></div>
                <button class="click-btn" onclick="increaseScore()">BANA TIKLA!</button>
                <p style="margin-top: 15px; color: #aaa; font-size: 0.9rem;">Her 10 skorda bir arka plan değişir!</p>
            </div>

            <div class="game-card">
                <h3>Satranç Oyunu</h3>
                <p class="status-text">Sıra: <span id="turn-text" style="color: #ff9f43; font-weight: bold;">Beyazda</span></p>
                
                <div id="board"></div>
                
                <button class="btn-reset" id="resetBtn">Oyunu Yeniden Başlat</button>
            </div>

        </div>
    </section>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>

    <script>
        // --- 1. TIKLAMA OYUNU ---
        let score = 0;
        const clickBgColors = ['#16161a', '#1e3c72', '#11998e', '#7F00FF', '#ff5e62'];

        function increaseScore() {
            score++;
            document.getElementById('score').textContent = score;

            if (score % 10 === 0) {
                const randomColor = clickBgColors[Math.floor(Math.random() * clickBgColors.length)];
                document.getElementById('clickGameCard').style.backgroundColor = randomColor;
            }
        }

        // --- 2. SATRANÇ OYUNU (BUGSUZ & KURAL KONTROLLÜ) ---
        var board = null;
        var game = new Chess();
        var $turnText = $('#turn-text');

        function onDragStart (source, piece, position, orientation) {
            // Oyun bittiyse veya yanlış oyuncunun sırasındaki taşa dokunulduysa hareketi engelle
            if (game.game_over()) return false;

            if ((game.turn() === 'w' && piece.search(/^b/) !== -1) ||
                (game.turn() === 'b' && piece.search(/^w/) !== -1)) {
                return false;
            }
        }

        function onDrop (source, target) {
            // Yapılan hamlenin kurallara uygunluğunu kontrol et
            var move = game.move({
                from: source,
                to: target,
                promotion: 'q' // Piyon sona ulaştığında otomatik olarak vezire dönüşür
            });

            // Hamle geçersiz veya kurallara aykırıysa taşı eski yerine geri fırlat
            if (move === null) return 'snapback';

            updateStatus();
        }

        function onSnapEnd () {
            board.position(game.fen());
        }

        function updateStatus () {
            var statusText = '';
            var activeColor = game.turn() === 'w' ? 'Beyazda' : 'Siyahda';

            if (game.in_checkmate()) {
                statusText = 'Oyun bitti! ' + (game.turn() === 'w' ? 'Siyah' : 'Beyaz') + ' kazandı (Mat).';
            } else if (game.in_draw()) {
                statusText = 'Oyun bitti! Berabere.';
            } else {
                statusText = activeColor;
                if (game.in_check()) {
                    statusText += ' (Şah!)';
                }
            }

            $turnText.html(statusText);
            $turnText.css('color', game.turn() === 'w' ? '#ff9f43' : '#a2a2a2');
        }

        var config = {
            draggable: true,
            position: 'start',
            onDragStart: onDragStart,
            onDrop: onDrop,
            onSnapEnd: onSnapEnd,
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
        };
        
        board = Chessboard('board', config);
        updateStatus();

        // Sıfırlama Butonu Akışı
        $('#resetBtn').on('click', function() {
            game.reset();
            board.start();
            updateStatus();
        });
    </script>
</body>
</html>
