<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Admin Girişi</title>
</head>
<body>

    <div id="login-form" style="text-align: center; margin-top: 50px;">
        <h2>Admin Paneli Girişi</h2>
        <input type="password" id="password-input" placeholder="Şifreyi giriniz">
        <button onclick="kontrolEt()">Giriş Yap</button>
        <p id="hata-mesaji" style="color: red; display: none;">Hatalı şifre girdiniz!</p>
    </div>

    <div id="admin-icerik" style="display: none; text-align: center; margin-top: 50px;">
        <h3>Hoş geldiniz, Kral Ayhan!</h3>
        <p>Burası sizin gizli admin panelinizdir.</p>
    </div>

    <script>
    function kontrolEt() {
        var girilenSifre = document.getElementById("password-input").value;
        
        if (girilenSifre === "Kral Ayhan 123") {
            document.getElementById("login-form").style.display = "none";
            document.getElementById("admin-icerik").style.display = "block";
        } else {
            document.getElementById("hata-mesaji").style.display = "block";
        }
    }
    </script>

</body>
</html>
